  <rect x="826" y="166" width="128" height="28" rx="14" fill="#FFFFFF"/>
  <text x="844" y="185" fill="#4B67F2" font-family="Manrope, Arial, sans-serif" font-size="14" font-weight="800">SOFTWARE DEVELOPER</text>
  <rect x="826" y="216" width="228" height="88" rx="20" fill="#F4F8FD"/>
  <text x="846" y="248" fill="#2B2238" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="800">Read Jira tickets,</text>
  <text x="846" y="274" fill="#2B2238" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="800">bug reports, and</text>
  <text x="846" y="300" fill="#2B2238" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="800">sprint updates.</text>
  <rect x="826" y="326" width="228" height="62" rx="20" fill="#E9F7F5"/>
  <text x="846" y="365" fill="#2B2238" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="800">Email + dialogue practice</text>
  <rect x="826" y="410" width="148" height="24" rx="12" fill="#FF7A59" fill-opacity="0.18"/>
  <text x="846" y="427" fill="#4B67F2" font-family="Manrope, Arial, sans-serif" font-size="14" font-weight="800">B1-B2 LEARNERS</text>
