  <text x="248" y="148" fill="#2B2238" font-family="Manrope, Arial, sans-serif" font-size="28" font-weight="800" letter-spacing="0.18em">WORKENGLISH</text>
  <text x="82" y="300" fill="#2B2238" font-family="Space Grotesk, Arial, sans-serif" font-size="72" font-weight="700">Learn English for your</text>
  <text x="82" y="380" fill="#2B2238" font-family="Space Grotesk, Arial, sans-serif" font-size="72" font-weight="700">actual job.</text>
  <text x="82" y="456" fill="#6D627D" font-family="Manrope, Arial, sans-serif" font-size="28" font-weight="600">Emails, vocabulary cards, workplace reading, and</text>
  <text x="82" y="494" fill="#6D627D" font-family="Manrope, Arial, sans-serif" font-size="28" font-weight="600">realistic dialogues for non-native professionals.</text>
